<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Reader</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

  <style>
    :root {
      --bg-1: #f4f8ff;
      --bg-2: #e9f1ff;
      --panel: #ffffff;
      --ink: #0f223a;
      --muted: #556981;
      --line: #c9d8eb;
      --accent: #1e6fd9;
      --accent-dark: #1452a8;
      --danger: #b42318;
      --ok: #137333;
      --shadow: 0 8px 20px rgba(22, 56, 94, .14);
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      font-family: "DM Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #d5e6ff 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #dfe9ff 0%, transparent 30%),
        linear-gradient(125deg, var(--bg-1), var(--bg-2));
      min-height: 100dvh;
    }

    .page {
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero {
      background: linear-gradient(145deg, #ffffff, #eef5ff);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero h1 {
      margin: 0;
      color: var(--accent);
      font-size: 24px;
      font-weight: 800;
    }

    .status {
      font-size: 13px;
      font-weight: 700;
      color: #27476a;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f4f8ff;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .hidden { display: none !important; }

    /* ── Start panel ── */
    .start {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
    }

    .scan-btn {
      min-height: 52px;
      min-width: 190px;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      box-shadow: 0 10px 22px rgba(30, 111, 217, .25);
    }

    .scan-btn:disabled { opacity: .65; cursor: not-allowed }
    .scan-btn:hover:not(:disabled) { background: var(--accent-dark) }

    .help {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Camera panel ── */
    .camera-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .camera-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #0f223a;
      aspect-ratio: 4/3;
      max-height: 340px;
    }

    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan overlay frame */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 62%;
      aspect-ratio: 1;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame .corner-br,
    .scan-frame .corner-bl {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: rgba(30, 111, 217, 0.95);
      border-style: solid;
    }

    .scan-frame::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-frame::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-frame .corner-bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

    /* Animated scan line */
    .scan-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      animation: scanMove 1.8s ease-in-out infinite;
      top: 6px;
    }

    @keyframes scanMove {
      0%   { top: 6px;   opacity: 1; }
      50%  { opacity: 1; }
      95%  { top: calc(100% - 8px); opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }

    /* Pulse ring on QR detect */
    .qr-found-ring {
      position: absolute;
      inset: 0;
      border: 3px solid #22c55e;
      border-radius: 14px;
      animation: ringPulse 0.4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ringPulse {
      from { opacity: 1; transform: scale(0.96); }
      to   { opacity: 0; transform: scale(1.02); }
    }

    /* Loading spinner overlay (for OCR) */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 34, 58, 0.72);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 14px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-label {
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* Scan step indicator */
    .scan-steps {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .step-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1.5px solid var(--line);
      background: #f4f8ff;
      color: var(--muted);
      transition: all 0.3s;
    }

    .step-pill.active {
      background: rgba(30, 111, 217, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .step-pill.done {
      background: rgba(19, 115, 51, 0.1);
      border-color: var(--ok);
      color: var(--ok);
    }

    .step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .step-pill.active .step-dot {
      animation: dotPulse 1s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .cam-cancel-btn {
      align-self: center;
      min-height: 40px;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #f4f8ff;
      color: #123a67;
    }

    .cam-cancel-btn:hover { background: #e2ecff; }

    /* ── Form panel ── */
    .preview-wrap {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #eef4ff;
    }

    .preview {
      width: 100%;
      display: block;
      max-height: 240px;
      object-fit: contain;
      background: #0f223a;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    input {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
      padding: 10px 12px;
      font-size: 15px;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(30, 111, 217, .15);
    }

    .hint {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 44px;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn:disabled { opacity: .65; cursor: not-allowed }

    .btn-primary {
      border: none;
      background: #28A745;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { filter: brightness(.95) }

    .btn-secondary {
      border: 1px solid var(--line);
      background: #f4f8ff;
      color: #123a67;
    }

    .message {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      font-weight: 700;
    }

    .ok  { color: var(--ok) }
    .err { color: var(--danger) }

    @media (min-width: 700px) {
      .grid { grid-template-columns: 1fr 1fr }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <h1>Scanner</h1>
      <div id="status" class="status">Ready to scan</div>
    </header>

    <!-- ── START PANEL ── -->
    <section id="startPanel" class="panel start">
      <button id="scanBtn" class="scan-btn" type="button">Scan Label</button>
      <p class="help">Tap scan to open the camera. QR codes are detected automatically.</p>
    </section>

    <!-- ── CAMERA PANEL ── -->
    <section id="cameraPanel" class="panel camera-panel hidden">
      <div class="camera-wrap" id="cameraWrap">
        <video id="cameraVideo" autoplay playsinline muted></video>

        <!-- Corner frame + scan line -->
        <div class="scan-overlay" id="scanOverlay">
          <div class="scan-frame">
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
            <div class="scan-line" id="scanLine"></div>
          </div>
        </div>

        <!-- OCR loading overlay (hidden until QR found) -->
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-label" id="loadingLabel">Reading label…</div>
        </div>
      </div>

      <!-- Step pills -->
      <div class="scan-steps">
        <div class="step-pill active" id="step1"><div class="step-dot"></div>Scanning QR</div>
        <div class="step-pill" id="step2"><div class="step-dot"></div>Reading Text</div>
        <div class="step-pill" id="step3"><div class="step-dot"></div>Done</div>
      </div>

      <button id="cancelBtn" class="cam-cancel-btn" type="button">Cancel</button>
    </section>

    <!-- ── FORM PANEL ── -->
    <section id="formPanel" class="panel hidden">
      <div class="preview-wrap">
        <img id="previewImage" class="preview" alt="Captured label preview">
      </div>

      <div class="grid">
        <div>
          <label for="cuttingInput">CUTTING TIME</label>
          <input id="cuttingInput" type="text" placeholder="hh:mm AM/PM">
          <div class="hint"></div>
        </div>
        <div>
          <label for="batchInput">QR DATA</label>
          <input id="batchInput" type="text" placeholder="QR value">
          <div class="hint"></div>
        </div>
        <div>
          <label for="serialInput">S.no</label>
          <input id="serialInput" type="text" placeholder="Enter serial">
          <div class="hint"></div>
        </div>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn btn-primary" type="button">Start</button>
        <button id="rescanBtn" class="btn btn-secondary" type="button">Re-scan Label</button>
      </div>
      <div id="saveMessage" class="message"></div>
    </section>

    <canvas id="canvas" class="hidden"></canvas>
  </main>

  <script>
    /* ══════════════════════════════════════════════════
       CONFIG
    ══════════════════════════════════════════════════ */
    const CONFIG = {
      SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzgAEH3WSFmbobQfIAmBBHZYUVsJcbcE0njXHVADtVR0cnC3AZ1j1qEFA6Cdbp6zsC49w/exec",
      OCR_API_KEY: "K88763438288957"
    };

    /* ══════════════════════════════════════════════════
       DOM REFS
    ══════════════════════════════════════════════════ */
    const statusEl       = document.getElementById("status");
    const startPanel     = document.getElementById("startPanel");
    const cameraPanel    = document.getElementById("cameraPanel");
    const formPanel      = document.getElementById("formPanel");
    const cameraVideo    = document.getElementById("cameraVideo");
    const cameraWrap     = document.getElementById("cameraWrap");
    const scanOverlay    = document.getElementById("scanOverlay");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingLabel   = document.getElementById("loadingLabel");
    const scanLine       = document.getElementById("scanLine");
    const step1          = document.getElementById("step1");
    const step2          = document.getElementById("step2");
    const step3          = document.getElementById("step3");
    const scanBtn        = document.getElementById("scanBtn");
    const cancelBtn      = document.getElementById("cancelBtn");
    const previewImage   = document.getElementById("previewImage");
    const cuttingInput   = document.getElementById("cuttingInput");
    const batchInput     = document.getElementById("batchInput");
    const serialInput    = document.getElementById("serialInput");
    const saveBtn        = document.getElementById("saveBtn");
    const rescanBtn      = document.getElementById("rescanBtn");
    const saveMessageEl  = document.getElementById("saveMessage");
    const canvas         = document.getElementById("canvas");
    const ctx            = canvas.getContext("2d");

    /* ══════════════════════════════════════════════════
       STATE
    ══════════════════════════════════════════════════ */
    let mediaStream     = null;
    let scanLoopId      = null;
    let scanActive      = false;
    let qrFoundRingEl   = null;
    let lastCuttingTime = localStorage.getItem("lastCuttingTime") || "";

    /* ══════════════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════════════ */
    function setStatus(text) { statusEl.textContent = text; }

    function setSaveMessage(text, isError) {
      saveMessageEl.textContent = text || "";
      saveMessageEl.className = "message " + (isError ? "err" : "ok");
    }

    function clearSaveMessage() {
      saveMessageEl.textContent = "";
      saveMessageEl.className = "message";
    }

    function rememberCuttingTime(value) {
      const normalized = (value || "").trim();
      lastCuttingTime = normalized;
      if (normalized) {
        localStorage.setItem("lastCuttingTime", normalized);
      } else {
        localStorage.removeItem("lastCuttingTime");
      }
    }

    function resetFormFields() {
      cuttingInput.value = "";
      batchInput.value   = "";
      serialInput.value  = "";
      document.querySelectorAll(".hint").forEach(h => h.textContent = "");
      clearSaveMessage();
    }

    function setStep(n) {
      [step1, step2, step3].forEach((el, i) => {
        el.classList.remove("active", "done");
        if (i + 1 < n)  el.classList.add("done");
        if (i + 1 === n) el.classList.add("active");
      });
    }

    /* ── Stage transitions ── */
    function openStartStage() {
      stopCamera();
      startPanel.classList.remove("hidden");
      cameraPanel.classList.add("hidden");
      formPanel.classList.add("hidden");
      setStatus("Ready to scan");
    }

    function openCameraStage() {
      startPanel.classList.add("hidden");
      cameraPanel.classList.remove("hidden");
      formPanel.classList.add("hidden");
      loadingOverlay.classList.add("hidden");
      setStep(1);
      setStatus("Scanning for QR code…");
    }

    function openFormStage() {
      cameraPanel.classList.add("hidden");
      startPanel.classList.add("hidden");
      formPanel.classList.remove("hidden");
      setStatus("Validate data and save");
      serialInput.focus();
    }

    /* ══════════════════════════════════════════════════
       CAMERA
    ══════════════════════════════════════════════════ */
    async function startCamera() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        cameraVideo.srcObject = mediaStream;
        await cameraVideo.play();
        openCameraStage();
        startScanLoop();
      } catch (err) {
        const msg = err.name === "NotAllowedError"
          ? "Camera permission denied. Please allow camera access and try again."
          : "Unable to access camera: " + (err.message || err.name);
        setStatus(msg);
        setSaveMessage(msg, true);
      }
    }

    function stopCamera() {
      scanActive = false;
      if (scanLoopId) { cancelAnimationFrame(scanLoopId); scanLoopId = null; }
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      cameraVideo.srcObject = null;
    }

    /* ══════════════════════════════════════════════════
       SCAN LOOP
    ══════════════════════════════════════════════════ */
    function startScanLoop() {
      scanActive = true;

      function tick() {
        if (!scanActive) return;
        if (cameraVideo.readyState < cameraVideo.HAVE_ENOUGH_DATA) {
          scanLoopId = requestAnimationFrame(tick);
          return;
        }

        // Draw current frame to canvas
        canvas.width  = cameraVideo.videoWidth;
        canvas.height = cameraVideo.videoHeight;
        ctx.drawImage(cameraVideo, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: "attemptBoth" });

        if (qr) {
          scanActive = false;
          onQRFound(qr.data);
          return;
        }

        scanLoopId = requestAnimationFrame(tick);
      }

      scanLoopId = requestAnimationFrame(tick);
    }

    /* ══════════════════════════════════════════════════
       QR FOUND → OCR PIPELINE
    ══════════════════════════════════════════════════ */
    async function onQRFound(qrData) {
      // Flash green ring
      flashQRRing();

      // Show captured frame as preview (canvas already has the frozen frame)
      previewImage.src = canvas.toDataURL("image/jpeg", 0.92);

      // Stop video stream but keep camera panel visible during OCR
      stopCamera();
      openCameraStage(); // keep camera panel, stop loop already done

      // Show loading state
      setStep(2);
      setStatus("Reading label text…");
      loadingOverlay.classList.remove("hidden");
      loadingLabel.textContent = "Reading label…";

      try {
        const ocrText = await readFieldsWithOcrSpace(canvas);
        loadingLabel.textContent = "Parsing fields…";

        let cuttingTime = "";
        let serial      = "";

        if (ocrText) {
          const parsed = parseOcrText(ocrText);
          cuttingTime = parsed.cuttingTime;
          serial      = parsed.serial;
        }

        setStep(3);
        setStatus("Done — validate and save");
        loadingOverlay.classList.add("hidden");

        // Brief "done" pause so user sees step 3 light up
        await delay(400);

        resetFormFields();
        batchInput.value   = qrData;
        cuttingInput.value = cuttingTime;
        serialInput.value  = serial;
        if (cuttingTime) rememberCuttingTime(cuttingTime);

        batchInput.nextElementSibling.textContent   = qrData ? "QR detected." : "";
        cuttingInput.nextElementSibling.textContent = cuttingTime ? "OCR extracted." : "Not found — please enter manually.";
        serialInput.nextElementSibling.textContent  = serial      ? "OCR extracted." : "Not found — please enter manually.";

        openFormStage();
      } catch (err) {
        loadingOverlay.classList.add("hidden");
        const msg = "OCR failed: " + (err.message || "Unknown error");
        setStatus(msg);

        // Still show form with whatever we have
        resetFormFields();
        batchInput.value = qrData;
        if (lastCuttingTime) {
          cuttingInput.value = lastCuttingTime;
          cuttingInput.nextElementSibling.textContent = "Using previously entered cutting time.";
        } else {
          cuttingInput.nextElementSibling.textContent = "Not found - please enter manually.";
        }
        openFormStage();
        setSaveMessage(msg, true);
      }
    }

    function flashQRRing() {
      if (qrFoundRingEl) qrFoundRingEl.remove();
      qrFoundRingEl = document.createElement("div");
      qrFoundRingEl.className = "qr-found-ring";
      cameraWrap.appendChild(qrFoundRingEl);
      setTimeout(() => { if (qrFoundRingEl) { qrFoundRingEl.remove(); qrFoundRingEl = null; } }, 600);
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    /* ══════════════════════════════════════════════════
       OCR.SPACE API
    ══════════════════════════════════════════════════ */
    async function readFieldsWithOcrSpace(sourceCanvas) {
      const base64Image = sourceCanvas.toDataURL("image/jpeg", 0.85);

      const formData = new FormData();
      formData.append("apikey",      CONFIG.OCR_API_KEY);
      formData.append("base64Image", base64Image);
      formData.append("language",    "eng");
      formData.append("isTable",     "true");
      formData.append("OCREngine",   "2");

      const response = await fetch("https://api.ocr.space/parse/image", {
        method: "POST",
        body: formData
      });

      const result = await response.json();
      console.log("OCR.space result:", result);

      if (result.OCRExitCode === 1 && result.ParsedResults && result.ParsedResults.length > 0) {
        return result.ParsedResults[0].ParsedText || "";
      }
      return "";
    }

    /* ══════════════════════════════════════════════════
       PARSE OCR TEXT
    ══════════════════════════════════════════════════ */
    function parseOcrText(fullText) {
      const lines = fullText.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);
      let cuttingTime = "";
      let serial      = "";

      // Serial Number
      const snoIdx = lines.findIndex(l => /(?:S\.?no|Serial)/i.test(l));
      if (snoIdx !== -1) {
        const match = lines[snoIdx].match(/(?:S\.?no|Serial):?\s*(\d+)/i);
        if (match) {
          serial = match[1];
        } else if (snoIdx + 1 < lines.length) {
          const nextMatch = lines[snoIdx + 1].match(/^(\d+)$/);
          if (nextMatch) serial = nextMatch[1];
        }
      }

      // Cutting Time
      const ctIdx = lines.findIndex(l => /cutting\s*time/i.test(l));
      if (ctIdx !== -1) {
        const matchSameLine = lines[ctIdx].match(/\d{1,2}:\d{2}\s*(AM|PM)?/i);
        if (matchSameLine) {
          cuttingTime = matchSameLine[0].toUpperCase();
        } else if (ctIdx + 1 < lines.length) {
          const matchNext = lines[ctIdx + 1].match(/\d{1,2}:\d{2}\s*(AM|PM)?/i);
          if (matchNext) cuttingTime = matchNext[0].toUpperCase();
        }
      }

      // Broad fallbacks
      if (!serial) {
        const broadSno = fullText.match(/(?:S\.?no|Serial):?\s*(\d+)/i);
        if (broadSno) serial = broadSno[1];
      }
      if (!cuttingTime) {
        const times = fullText.match(/\d{1,2}:\d{2}\s*(AM|PM)?/gi) || [];
        if (times.length > 0) cuttingTime = times[times.length - 1].toUpperCase();
      }

      return { cuttingTime, serial };
    }

    /* ══════════════════════════════════════════════════
       SAVE TO GOOGLE SHEETS
    ══════════════════════════════════════════════════ */
    function validatePayload() {
      const payload = {
        cuttingTime: cuttingInput.value.trim(),
        batch:       batchInput.value.trim(),
        serial:      serialInput.value.trim()
      };
      if (!payload.serial) throw new Error("S.no is required.");
      if (!payload.batch)  throw new Error("QR data is required.");
      return payload;
    }

    async function saveToSheet() {
      clearSaveMessage();

      if (!CONFIG.SCRIPT_URL) {
        setSaveMessage("Set SCRIPT_URL before saving.", true);
        return;
      }

      let payload;
      try { payload = validatePayload(); }
      catch (err) { setSaveMessage(err.message, true); return; }
      rememberCuttingTime(payload.cuttingTime);

      saveBtn.disabled = true;
      setStatus("Saving to sheet…");

      try {
        const response = await fetch(CONFIG.SCRIPT_URL, {
          method: "POST",
          body: new URLSearchParams(payload)
        });

        const raw = await response.text();
        let data = { ok: response.ok };
        try { data = JSON.parse(raw); }
        catch (e) { data = { ok: response.ok, message: raw }; }

        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "Unable to save row.");
        }

        setSaveMessage("Saved successfully.", false);
        setStatus("Saved. You can re-scan next label.");
      } catch (err) {
        setStatus("Save failed");
        setSaveMessage("Save failed: " + (err.message || "Unknown error"), true);
      } finally {
        saveBtn.disabled = false;
      }
    }

    /* ══════════════════════════════════════════════════
       EVENT LISTENERS
    ══════════════════════════════════════════════════ */
    scanBtn.addEventListener("click", () => {
      clearSaveMessage();
      startCamera();
    });

    cancelBtn.addEventListener("click", () => {
      openStartStage();
    });

    saveBtn.addEventListener("click", saveToSheet);

    cuttingInput.addEventListener("change", () => {
      rememberCuttingTime(cuttingInput.value);
    });

    rescanBtn.addEventListener("click", () => {
      resetFormFields();
      previewImage.src = "";
      openStartStage();
    });

    window.addEventListener("beforeunload", () => { stopCamera(); });

    /* ── INIT ── */
    openStartStage();
  </script>
</body>
</html>
